<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Remesh Mini{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
    background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
    color: #111827;
    font-family: 'Inter', Arial, sans-serif;
}

.navbar-custom {
    background: rgba(255, 255, 255, 0.85);
    border-bottom: 1px solid #e5e7eb;
    padding: 16px 0;
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.brand {
    font-size: 1.35rem;
    font-weight: 800;
    color: #0f172a;
    text-decoration: none;
    letter-spacing: -0.02em;
}

.hero {
    background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 55%, #3b82f6 100%);
    color: white;
    padding: 56px;
    border-radius: 24px;
    margin: 32px 0;
    box-shadow: 0 20px 50px rgba(29, 78, 216, 0.18);
}

.hero h1 {
    font-size: 2.7rem;
    font-weight: 800;
    margin-bottom: 14px;
    letter-spacing: -0.03em;
}

.hero p {
    font-size: 1.05rem;
    margin-bottom: 0;
    color: rgba(255,255,255,0.88);
    max-width: 700px;
}

.section-title {
    font-size: 1.65rem;
    font-weight: 800;
    margin-bottom: 18px;
    letter-spacing: -0.02em;
}

.app-card {
    background: rgba(255,255,255,0.96);
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 12px 32px rgba(15, 23, 42, 0.07);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.app-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
}

.message-card {
    background: rgba(255,255,255,0.98);
    border: 1px solid #dbeafe;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 18px;
    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.08);
}

.muted-label {
    color: #6b7280;
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.top-actions .btn {
    margin-right: 10px;
    margin-bottom: 10px;
    border-radius: 12px;
    padding: 10px 16px;
    font-weight: 600;
}

.thought-list li {
    margin-bottom: 8px;
    line-height: 1.55;
}

.search-box {
    background: rgba(255,255,255,0.95);
    border: 1px solid #e5e7eb;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
}

input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    margin-top: 6px;
    background: white;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
}

label {
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
    color: #1f2937;
}

textarea {
    min-height: 120px;
}

.btn {
    border-radius: 12px !important;
    font-weight: 600 !important;
    padding: 10px 16px !important;
}

.btn-primary {
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%) !important;
    border: none !important;
}

.btn-primary:hover {
    background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%) !important;
}

hr {
    color: #dbeafe;
}

.text-muted {
    color: #6b7280 !important;
}
    </style>
</head>
<body>
    <nav class="navbar-custom">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="{% url 'conversation_list' %}" class="brand">remesh.ai mini</a>
            <div>
                <a href="{% url 'conversation_create' %}" class="btn btn-primary btn-sm">New Conversation</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="container pb-4 pt-2">
    <div class="text-center text-muted small">
        remesh.ai mini · simplified conversation insights demo
    </div>
    </footer>
</body>
</html>
